site_name: ChemSpace Copilot
site_description: LLM-powered agent system for GTM-based chemical space analysis
repo_url: https://github.com/Laboratoire-de-Chemoinformatique/chemspacecopilot
repo_name: Laboratoire-de-Chemoinformatique/chemspacecopilot

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

strict: false

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Docker: getting-started/docker.md
  - Architecture:
      - Overview: architecture/overview.md
      - Agents: architecture/agents.md
      - Tools: architecture/tools.md
      - Storage: architecture/storage.md
      - Prediction: architecture/prediction.md
  - API Reference:
      - Agents: api/agents.md
      - Tools: api/tools.md
      - Storage: api/storage.md
  - Testing:
      - Unit Tests: testing/unit.md
      - Robustness Tests: testing/robustness.md
  - Contributing: contributing.md

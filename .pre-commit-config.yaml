# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: ^notebooks/
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: ^notebooks/
      - id: check-yaml
        name: Check YAML syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=10000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: debug-statements
        name: Check for debug statements
        exclude: ^notebooks/

  # Python code formatting with Black (only src and tests)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: Format code with Black
        files: ^(src/|tests/)

  # Import sorting with isort (only src and tests)
  #- repo: https://github.com/PyCQA/isort
  #  rev: 5.13.2
  #  hooks:
  #    - id: isort
  #      name: Sort imports with isort
  #      args: ["--profile", "black"]
  #      files: ^(src/|tests/)

  # Python linting with Ruff (only src and tests, auto-fix safe issues)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: Lint with Ruff
        args: [--fix]
        files: ^(src/|tests/)

  # Run tests
  - repo: local
    hooks:
      - id: pytest-check
        name: Run unit tests
        entry: uv run python -m pytest tests/unit/ -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Agents (ChEMBL, GTM, Autoencoder, etc.)
        - UI (Chainlit interface)
        - Storage (S3/MinIO, local filesystem)
        - Tools (toolkits, chemistry operations)
        - Docker / Deployment
        - Testing framework
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run '...'
        2. Send prompt '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant log output or error messages.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.11.x
        - Docker: yes/no
        - USE_S3: true/false
